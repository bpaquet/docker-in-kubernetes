[tools]
go = "1.26"
golangci-lint = "2.12.2"
kind = "0.32.0"
kubectl = "1.32"

[tasks.build]
description = "Build the docker-in-kubernetes binary into ./bin"
run = "go build -o bin/docker-in-kubernetes ./cmd/docker-in-kubernetes"

[tasks.test]
description = "Run unit tests with the race detector"
run = "go test -race -count=1 ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.fmt]
description = "Apply gofmt to the tree"
run = "gofmt -w ."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.tidy]
description = "Run go mod tidy"
run = "go mod tidy"

[tasks.run]
description = "Build then run the daemon on the default socket"
depends = ["build"]
run = "./bin/docker-in-kubernetes --socket /tmp/docker-in-kubernetes.sock"

[tasks.ci]
description = "Run the same checks CI runs (fmt, vet, lint, test)"
depends = ["fmt", "vet", "lint", "test"]

# --- Integration testing against a kind cluster -----------------------------
# Lives entirely under ./tmp and a dedicated kind cluster named `dik-test`.
# Never touches ~/.kube/config.

[tasks.integration-up]
description = "Create the dik-test kind cluster (or refresh kubeconfig if it already exists) and ensure the docker-in-kubernetes namespace"
run = """
mkdir -p tmp
if kind get clusters 2>/dev/null | grep -q '^dik-test$'; then
  kind export kubeconfig --name dik-test --kubeconfig ./tmp/integration-kubeconfig
else
  kind create cluster --name dik-test --kubeconfig ./tmp/integration-kubeconfig
fi
export KUBECONFIG=./tmp/integration-kubeconfig
kubectl create namespace docker-in-kubernetes --dry-run=client -o yaml | kubectl apply -f -
# The default ServiceAccount is auto-created by the namespace controller; pods
# can't be scheduled until it exists. CI hits this race on fresh clusters.
for i in $(seq 1 60); do
  if kubectl get serviceaccount/default -n docker-in-kubernetes >/dev/null 2>&1; then
    break
  fi
  sleep 1
done
"""

[tasks.integration-down]
description = "Delete the dik-test kind cluster"
run = "kind delete cluster --name dik-test"

[tasks.integration-test]
description = "Run integration tests against the dik-test kind cluster (must be up)"
# -v on by default: each test does network work and may take seconds; per-test
# pass/fail lines make CI logs intelligible.
run = 'KUBECONFIG="$PWD/tmp/integration-kubeconfig" go test -tags=integration -count=1 -v -timeout 10m ./internal/integration/...'
